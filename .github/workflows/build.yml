name: Build TSML

on:
  push:
    paths:
      - 'src/**'    # Only trigger if TSMLCore changes
      - 'BuiltInMods/**'
      - 'Modules/JarUtil/**'
      - 'Modules/Loader/**'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TSMLEncryptToken: ${{ secrets.TSMLEncryptToken }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build TSML
        run: ./gradlew build -PTSMLEncryptToken=$TSMLEncryptToken